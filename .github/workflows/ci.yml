name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-p6:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            live: true
          - os: windows-latest
            live: false
    runs-on: ${{ matrix.os }}
    env:
      DATABASE_URL: postgresql://dpe:dpe@localhost:5432/dpe
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dpe
          POSTGRES_PASSWORD: dpe
          POSTGRES_DB: dpe
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dpe -d dpe"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: P6 verification (live E2E)
        if: matrix.live
        run: pnpm verify:p6 --live

      - name: P6 verification (offline)
        if: "!matrix.live"
        run: pnpm verify:p6
